<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MoodFlicks — Movies for Your Mood</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b88;
    --accent: #c084fc;
    --accent2: #818cf8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    position: relative;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* ── MAIN CONTAINER ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.2rem 4rem;
  }

  /* ── STEP LABEL ── */
  .step-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  /* ── MOOD GRID ── */
  .section { margin-bottom: 2rem; }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.75rem;
  }
  .mood-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
  }
  .mood-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .mood-btn.active {
    border-color: var(--accent);
    background: rgba(192,132,252,0.12);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .mood-emoji { font-size: 1.8rem; }

  /* ── LANGUAGE CHIPS ── */
  .lang-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .lang-chip {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 0.45rem 1.1rem;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  .lang-chip:hover { border-color: var(--accent2); }
  .lang-chip.active {
    background: rgba(129,140,248,0.15);
    border-color: var(--accent2);
    color: #a5b4fc;
  }

  /* ── CTA ── */
  .cta-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #c084fc, #818cf8);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 0.5rem;
  }
  .cta-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .cta-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── LOADER ── */
  .loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 2.5rem 0;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .loader.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULTS ── */
  #results { display: none; }
  #results.show { display: block; }

  .results-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .results-header span { color: var(--accent); }

  .movie-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.3rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .movie-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .movie-card:hover { border-color: rgba(192,132,252,0.3); }
  .movie-card:hover::before { opacity: 1; }

  .movie-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.6rem;
  }
  .movie-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .movie-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.7rem;
  }
  .badge {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
  }
  .badge-lang { background: rgba(56,189,248,0.15); color: #7dd3fc; }
  .badge-genre { background: rgba(192,132,252,0.15); color: #d8b4fe; }
  .badge-year { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-rating { background: rgba(251,191,36,0.15); color: #fcd34d; }

  .movie-desc {
    font-size: 0.83rem;
    color: #9999bb;
    line-height: 1.65;
  }
  .movie-why {
    margin-top: 0.7rem;
    font-size: 0.78rem;
    color: var(--accent);
    font-style: italic;
  }

  /* ── RESET ── */
  .reset-btn {
    width: 100%;
    padding: 0.75rem;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 1rem;
    color: #fca5a5;
    font-size: 0.85rem;
    text-align: center;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">MoodFlicks</div>
  <div class="tagline">Tell us how you feel. We'll find your movie.</div>
</header>

<div class="container">

  <!-- STEP 1: MOOD -->
  <div class="section" id="step1">
    <div class="step-label">Step 1 — Abhi kaisa feel ho raha hai?</div>
    <div class="mood-grid">
      <button class="mood-btn" data-mood="happy">
        <span class="mood-emoji">😄</span> Khush / Happy
      </button>
      <button class="mood-btn" data-mood="sad">
        <span class="mood-emoji">😢</span> Udaas / Sad
      </button>
      <button class="mood-btn" data-mood="excited">
        <span class="mood-emoji">🤩</span> Excited / Pumped
      </button>
      <button class="mood-btn" data-mood="romantic">
        <span class="mood-emoji">🥰</span> Romantic / Pyaar
      </button>
      <button class="mood-btn" data-mood="bored">
        <span class="mood-emoji">😑</span> Bakwaas / Bored
      </button>
      <button class="mood-btn" data-mood="scared">
        <span class="mood-emoji">😱</span> Darna chahta hun
      </button>
      <button class="mood-btn" data-mood="angry">
        <span class="mood-emoji">😤</span> Gussa / Angry
      </button>
      <button class="mood-btn" data-mood="chill">
        <span class="mood-emoji">😌</span> Chill / Relaxed
      </button>
      <button class="mood-btn" data-mood="motivated">
        <span class="mood-emoji">💪</span> Motivated / Inspired
      </button>
      <button class="mood-btn" data-mood="curious">
        <span class="mood-emoji">🤔</span> Kuch Hatke
      </button>
    </div>
  </div>

  <!-- STEP 2: LANGUAGE -->
  <div class="section" id="step2">
    <div class="step-label">Step 2 — Kaunsi language mein dekhna hai?</div>
    <div class="lang-row">
      <button class="lang-chip" data-lang="Bollywood">🎬 Bollywood</button>
      <button class="lang-chip" data-lang="Hollywood">🌍 Hollywood</button>
      <button class="lang-chip" data-lang="South Indian">🌴 South Indian</button>
      <button class="lang-chip" data-lang="any">✨ Kuch bhi chalega</button>
    </div>
  </div>

  <!-- CTA -->
  <button class="cta-btn" id="findBtn" disabled>🎬 Meri Movies Dhundo</button>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>Tera mood samajh raha hun...</span>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg">Kuch gadbad ho gayi! Thodi der baad try karo.</div>

  <!-- RESULTS -->
  <div id="results">
    <div class="results-header" id="resultsHeader">
      <span id="moodEmoji"></span> Tere mood ke liye <span id="moodLabel"></span> movies
    </div>
    <div id="movieList"></div>
    <button class="reset-btn" id="resetBtn">↩ Dobara try karo</button>
  </div>

</div>

<script>
  let selectedMood = null;
  let selectedLang = null;

  const moodLabels = {
    happy: { label: 'Happy', emoji: '😄' },
    sad: { label: 'Sad', emoji: '😢' },
    excited: { label: 'Excited', emoji: '🤩' },
    romantic: { label: 'Romantic', emoji: '🥰' },
    bored: { label: 'Bored', emoji: '😑' },
    scared: { label: 'Scary', emoji: '😱' },
    angry: { label: 'Intense', emoji: '😤' },
    chill: { label: 'Chill', emoji: '😌' },
    motivated: { label: 'Motivational', emoji: '💪' },
    curious: { label: 'Hatke', emoji: '🤔' },
  };

  // Mood selection
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMood = btn.dataset.mood;
      checkReady();
    });
  });

  // Language selection
  document.querySelectorAll('.lang-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedLang = chip.dataset.lang;
      checkReady();
    });
  });

  function checkReady() {
    document.getElementById('findBtn').disabled = !(selectedMood && selectedLang);
  }

  document.getElementById('findBtn').addEventListener('click', getMovies);
  document.getElementById('resetBtn').addEventListener('click', reset);

  async function getMovies() {
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');
    const errorMsg = document.getElementById('errorMsg');
    const findBtn = document.getElementById('findBtn');

    loader.classList.add('show');
    results.classList.remove('show');
    errorMsg.classList.remove('show');
    findBtn.disabled = true;

    const langInstruction = selectedLang === 'any'
      ? 'Mix of Bollywood, Hollywood, and South Indian films'
      : `Only ${selectedLang} films`;

    const prompt = `You are a passionate movie expert. A user is feeling "${selectedMood}" right now and wants ${langInstruction} recommendations.

Suggest exactly 5 movies perfectly matched to this mood. For each movie respond ONLY with a valid JSON array (no markdown, no explanation) like this:

[
  {
    "title": "Movie Name",
    "year": "2023",
    "language": "Hindi/English/Telugu etc",
    "genre": "Drama/Comedy/etc",
    "rating": "8.2/10",
    "description": "2-3 lines about the movie in simple Hinglish",
    "why": "Why this movie perfectly matches the ${selectedMood} mood in 1 line"
  }
]

Make sure movies are genuinely great and match the mood perfectly. Return ONLY the JSON array, nothing else.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(i => i.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const movies = JSON.parse(clean);

      renderMovies(movies);
    } catch (err) {
      console.error(err);
      errorMsg.classList.add('show');
      findBtn.disabled = false;
    } finally {
      loader.classList.remove('show');
    }
  }

  function renderMovies(movies) {
    const results = document.getElementById('results');
    const movieList = document.getElementById('movieList');
    const moodInfo = moodLabels[selectedMood] || { label: selectedMood, emoji: '🎬' };

    document.getElementById('moodEmoji').textContent = moodInfo.emoji;
    document.getElementById('moodLabel').textContent = moodInfo.label;

    movieList.innerHTML = movies.map((m, i) => `
      <div class="movie-card">
        <div class="movie-top">
          <div class="movie-title">${i + 1}. ${m.title}</div>
        </div>
        <div class="movie-meta">
          <span class="badge badge-lang">${m.language}</span>
          <span class="badge badge-genre">${m.genre}</span>
          <span class="badge badge-year">${m.year}</span>
          <span class="badge badge-rating">⭐ ${m.rating}</span>
        </div>
        <div class="movie-desc">${m.description}</div>
        <div class="movie-why">💡 ${m.why}</div>
      </div>
    `).join('');

    results.classList.add('show');
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function reset() {
    selectedMood = null;
    selectedLang = null;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
    document.getElementById('results').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('findBtn').disabled = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
